<!-- @dsCard group="Brand" viewport="700x210" name="Strata motif" subtitle="Signature sedimentary banding for hero & feature blocks" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); padding: 24px; font-family: var(--font-sans); display:flex; gap:16px; }
  .tile { flex:1; height: 150px; border-radius: var(--r-lg); position:relative; overflow:hidden; box-shadow: var(--shadow-sm); }
  .cap { position:absolute; left:14px; bottom:12px; font: var(--fw-semibold) 10px/1 var(--font-mono); letter-spacing:.04em; padding: 5px 9px; border-radius: var(--r-pill); background: rgba(253,250,243,.88); color: var(--rock-700); }
</style>
</head>
<body>
  <div class="tile shale-strata"><span class="cap">.shale-strata</span></div>
  <div class="tile shale-strata-soft"><span class="cap" style="background:rgba(26,23,20,.7);color:var(--rock-150)">.shale-strata-soft</span></div>
  <div class="tile shale-sandstone" style="box-shadow:inset 0 0 0 1px var(--border)"><span class="cap">.shale-sandstone</span></div>
</body>
</html>
