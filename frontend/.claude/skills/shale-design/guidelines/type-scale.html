<!-- @dsCard group="Type" viewport="700x250" name="Type scale" subtitle="Tuned 1.25 ramp across the three families" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); padding: 22px 26px; font-family: var(--font-sans); color: var(--text-strong); }
  .r { display:flex; align-items:baseline; gap:16px; padding: 5px 0; border-bottom: 1px solid var(--border-soft); }
  .r:last-child { border-bottom:0; }
  .r .tok { width: 96px; flex:none; font: 11px/1 var(--font-mono); color: var(--text-muted); }
  .r .spec { flex:none; width: 70px; font: 10px/1 var(--font-mono); color: var(--text-faint); }
  .r .ex { font-family: var(--font-serif); color: var(--text-strong); letter-spacing:-0.02em; white-space:nowrap; }
</style>
</head>
<body>
  <div class="r"><span class="tok">4xl / display</span><span class="spec">56px</span><span class="ex" style="font-size:40px;font-weight:700">Sediment</span></div>
  <div class="r"><span class="tok">3xl / h1</span><span class="spec">42px</span><span class="ex" style="font-size:33px;font-weight:700">Three tranches</span></div>
  <div class="r"><span class="tok">2xl / h2</span><span class="spec">32px</span><span class="ex" style="font-size:26px;font-weight:600">Risk, stratified</span></div>
  <div class="r"><span class="tok">lg / h3</span><span class="spec">20px</span><span class="ex" style="font-size:20px;font-weight:600;font-family:var(--font-sans)">Deposit & earn</span></div>
  <div class="r"><span class="tok">base / body</span><span class="spec">15px</span><span class="ex" style="font-size:15px;font-weight:400;font-family:var(--font-sans);color:var(--text-body)">Yield settles each epoch via waterfall.</span></div>
  <div class="r"><span class="tok">xs / label</span><span class="spec">12px</span><span class="ex" style="font-size:12px;font-weight:600;font-family:var(--font-sans);letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted)">Loss priority</span></div>
</body>
</html>
