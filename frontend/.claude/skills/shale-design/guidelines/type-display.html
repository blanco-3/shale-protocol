<!-- @dsCard group="Type" viewport="700x230" name="Display serif — Spectral" subtitle="Editorial headlines & the wordmark voice" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); padding: 26px 28px; font-family: var(--font-serif); color: var(--text-strong); }
  .ey { font: var(--fw-semibold) 10px/1 var(--font-sans); letter-spacing:.14em; text-transform:uppercase; color: var(--text-faint); margin-bottom: 14px; }
  .d { font-weight: 700; font-size: 52px; line-height: .98; letter-spacing: -0.03em; }
  .d em { font-style: italic; font-weight: 600; color: var(--rock-500); }
  .h { font-weight: 600; font-size: 26px; line-height: 1.1; letter-spacing:-0.015em; margin-top: 14px; }
  .meta { font: 11px/1 var(--font-mono); color: var(--text-muted); margin-top: 16px; }
</style>
</head>
<body>
  <div class="ey">Spectral · serif</div>
  <div class="d">Yield, <em>stratified.</em></div>
  <div class="h">Structured finance, settled on-chain</div>
  <div class="meta">Spectral — 600 / 700 · display, h1, h2 · tracking −0.03em</div>
</body>
</html>
