<!-- @dsCard group="Components" viewport="700x320" name="Forms — Input · Segmented" subtitle="Amount entry and the CORE/SEAM/APEX tier selector" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; background:var(--bg); padding:24px; font-family:var(--font-sans); }
  .lbl { font:var(--fw-semibold) 10px/1 var(--font-sans); letter-spacing:.14em; text-transform:uppercase; color:var(--text-faint); margin:0 0 12px; }
  .grp { margin-bottom:22px; }
  .two { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Input, SegmentedControl, Button } = window.SHALEDesignSystem_1fdf95;
function Demo() {
  const [tier, setTier] = React.useState("apex");
  const [amt, setAmt] = React.useState("1000.00");
  return (
    <div>
      <div className="grp">
        <div className="lbl">Segmented control — tier selector</div>
        <SegmentedControl value={tier} onChange={setTier} options={[
          { value:"core", label:"CORE", sub:"Stable", tone:"core" },
          { value:"seam", label:"SEAM", sub:"Balanced", tone:"seam" },
          { value:"apex", label:"APEX", sub:"Aggressive", tone:"apex" },
        ]} />
      </div>
      <div className="grp two">
        <Input label="Amount (USDC)" prefix="$" value={amt} onChange={(e)=>setAmt(e.target.value)} suffix="MAX" />
        <Input label="Recipient" mono={false} placeholder="0x…" error="Enter a valid address" />
      </div>
      <Button fullWidth tone={tier}>Approve &amp; Deposit to {tier.toUpperCase()} →</Button>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
