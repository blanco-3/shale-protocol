<!-- @dsCard group="Type" viewport="700x220" name="Mono — financial figures" subtitle="JetBrains Mono · every number, address & bps" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-ink); padding: 26px 28px; font-family: var(--font-mono); color: var(--text-inverse); }
  .ey { font: var(--fw-semibold) 10px/1 var(--font-sans); letter-spacing:.14em; text-transform:uppercase; color: var(--rock-300); margin-bottom: 16px; }
  .big { font: var(--fw-medium) 46px/1 var(--font-mono); letter-spacing:-0.02em; font-variant-numeric: tabular-nums; }
  .big span { color: var(--core-300); }
  .grid { display:flex; gap: 28px; margin-top: 16px; font-variant-numeric: tabular-nums; }
  .grid div span { display:block; font: var(--fw-semibold) 9px/1 var(--font-sans); letter-spacing:.12em; text-transform:uppercase; color: var(--text-on-ink-muted); margin-bottom:6px; }
  .grid div b { font: var(--fw-medium) 18px/1 var(--font-mono); color: var(--rock-150); }
  .meta { font: 11px/1 var(--font-mono); color: var(--text-on-ink-muted); margin-top: 18px; }
</style>
</head>
<body>
  <div class="ey">JetBrains Mono · data</div>
  <div class="big">$2,481,094.20 <span>+7.34%</span></div>
  <div class="grid">
    <div><span>CORE APY</span><b>2.50–3.50%</b></div>
    <div><span>SEAM APY</span><b>5.00–7.00%</b></div>
    <div><span>APEX</span><b>10.2%+</b></div>
    <div><span>Vault</span><b>0x3989…22DC</b></div>
  </div>
  <div class="meta">JetBrains Mono — tabular-nums · substitutes shipped Geist Mono</div>
</body>
</html>
