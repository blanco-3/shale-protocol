<!-- @dsCard group="Brand" viewport="700x230" name="Strata mark" subtitle="The logo — three diagonal rock strata on bedrock" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-card); padding: 28px; font-family: var(--font-sans); display:flex; align-items:center; gap:36px; }
  .panel { display:flex; align-items:flex-end; gap:24px; }
  .u { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .tok { font: 10px/1 var(--font-mono); color: var(--text-muted); }
  .onink { background: var(--surface-ink); border-radius: var(--r-lg); padding: 22px 26px; display:flex; align-items:center; gap:18px; }
  .note { max-width: 190px; }
  .note h4 { font: var(--fw-bold) 14px/1.2 var(--font-serif); color: var(--text-strong); margin-bottom:6px; }
  .note p { font: 12px/1.5 var(--font-sans); color: var(--text-muted); }
</style>
</head>
<body>
  <div class="panel">
    <div class="u"><img src="../assets/shale-mark.svg" width="84" height="84" alt="SHALE mark"><div class="tok">84</div></div>
    <div class="u"><img src="../assets/shale-mark.svg" width="48" height="48" alt=""><div class="tok">48</div></div>
    <div class="u"><img src="../assets/shale-mark.svg" width="28" height="28" alt=""><div class="tok">28</div></div>
    <div class="u onink" style="padding:14px"><img src="../assets/shale-mark.svg" width="40" height="40" alt=""></div>
  </div>
  <div class="note">
    <h4>Three strata, one mark</h4>
    <p>Sandy gold, dark brown, warm amber — divided by bedrock hairlines at an ~18° tilt. The same three layers as CORE · SEAM · APEX.</p>
  </div>
</body>
</html>
